<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Virtual Gift</title>

<style>
body{
    margin:0;
    text-align:center;
    font-family:Arial;
    background:#ffe6ea;
    overflow:hidden;
}

.container{
    margin-top:40px;
}

h1{
    color:#444;
}

.gift{
    display:none;
    font-size:80px;
    margin:20px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:20px;
    margin:10px;
    background:pink;
    font-size:18px;
}

.msg{
    font-size:28px;
    color:#444;
}

.hidden{
    display:none;
}
</style>
</head>

<body>

<div class="container">

<h2>💖 Do you love me?? 💖</h2>

<button onclick="showGift()">YES !!</button>
<button onclick="moveButton(this)">NO :(</button>

<div id="giftSection" class="hidden">

<p class="msg">I know you love me 💕</p>

<div class="gift">🎁 🎁 🎁</div>

<button onclick="reveal()">Tap to reveal gifts</button>

<div id="message"></div>

</div>

</div>

<script>

function showGift(){
document.getElementById("giftSection")
.classList.remove("hidden");

document.querySelector(".gift").style.display="block";
}

function moveButton(btn){
btn.style.position="absolute";

btn.style.left=
Math.random()*300+"px";

btn.style.top=
Math.random()*500+"px";
}

function reveal(){

document.getElementById("message")
.innerHTML=
`
<h2>🌸 Here is your gift 🌸</h2>
<p>You are special ❤️</p>
<p>💐 🧸 🍫</p>
`;

}

</script>

</body>
</html>
